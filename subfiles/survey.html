<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../cssfiles/final.css">
</head>

<body class="survey">

    <header>
        <h1>Customer Experience Survey</h1>
    </header>
    <article>
        We want to hear what you thought of our website, so please feel free to fill out this small survey to give us
        some feedback.
    </article>
    <div class="survey">
        <form>
            <div class="form">
                <label for="FulfilledPurpose">Did you find this site informative / helpful?</label>
                <input type="radio" id="FulfilledPurpose" value="yes">
                <br>
                <label for="ParkRec">Do you have any parks to reccomend?</label>
                <input type="text" id="ParkRec" value="">
                <br>
                <label for="EnjoyValue">Rate your enjoyment of this website</label>
                <input type="radio" id="EnjoyValue">
                <br>
                <div>What Features did you most enjoy from this website?</div>
                <br>
                <input type="checkbox" id="ImgMap">
                <label for="ImgMap">Interactive Map</label>
                <br>
                <input type="checkbox" id="altLinks">
                <label for="altLinks">Alternative Links to Pages</label>
                <br>
                <input type="checkbox" id="ParkVideo">
                <label for="ParkVideo">Videos of the Parks</label>
                <br>
                <input type="checkbox" id="AnimalplantTable">
                <label for="AnimalplantTable">List of Threatened Animal and Plantlife</label>
                <br>
                <label for="Park">Which park page stood out the most to you?</label>
                <select id="Park" name="favPark" size="1">
                    <option value="Magnuson_Park"> Magnuson Park</option>
                    <option value="Juanita_Bay_Park">Juanita Bay Park</option>
                    <option value="Seward_Park">Seward Park</option>
                </select>
            </div>
            <input type="submit" id="submitFeedback" name="submission" value="Submit Feedback">
            <br>
            <input type="reset" id="ResetSurvey" name="resetButton" value="Reset survey">
        </form>
    </div>
    <footer><a href="../index.html">Return to homepage</a></footer>
</body>

</html>
